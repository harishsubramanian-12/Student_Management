<!DOCTYPE html>
<html>
    <head>
        <title>Student List</title>
    </head>
    <body>
        <h2>Student Management System</h2>
        <table border="1">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Department</th>
                <th>Age</th>
            </tr>
            {% for student in students %}
            <tr>
                <th>{{ student.name }}</th>
                <th>{{ student.email }}</th>
                <th>{{ student.mobile }}</th>
                <th>{{ student.department }}</th>
                <th>{{ student.age }}</th>
            </tr>
            {% endfor %}
        </table>
    </body>
</html>
